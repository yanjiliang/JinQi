name: BaDuanJin
options:
  bundleIdPrefix: com.yangsheng
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "2"
    INFOPLIST_FILE: BaDuanJin/Info.plist
    GENERATE_INFOPLIST_FILE: false

targets:
  BaDuanJin:
    type: application
    platform: iOS
    sources:
      - path: BaDuanJin
        excludes:
          - "Resources/**"
    resources:
      - path: BaDuanJin/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jinqi.app
        INFOPLIST_FILE: BaDuanJin/Info.plist
        GENERATE_INFOPLIST_FILE: false
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTED_INTERFACE_ORIENTATIONS_IPAD: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  BaDuanJinTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BaDuanJinTests
    dependencies:
      - target: BaDuanJin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jinqi.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BaDuanJin.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BaDuanJin"
        BUNDLE_LOADER: "$(TEST_HOST)"
